name: Daily Streamlit Auto Reboot

on:
  schedule:
    - cron: '0 15 * * *'  # 매일 한국 시간(KST) 자정(오전 0시)에 자동으로 실행 (UTC 기준 15:00)
  workflow_dispatch:      # 깃허브 웹사이트에서 내가 원할 때 수동으로 실행할 수 있는 버튼 활성화

jobs:
  reboot:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 재부팅 트리거 파일 업데이트 (현재 시간 기록)
        run: |
          echo "Last reboot: $(date)" > reboot_trigger.txt

      - name: 3. 변경사항을 깃허브에 반영(Push)하기
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reboot_trigger.txt
          git commit -m "🤖 매일 자동 재부팅 트리거 (reboot_trigger.txt 업데이트)" || echo "변경 사항 없음"
          git push
